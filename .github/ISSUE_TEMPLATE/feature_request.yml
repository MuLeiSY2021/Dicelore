name: ✨ 功能建议
description: 为 Dicelore 提一个新功能或改进想法
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提建议!较大的设计想法也欢迎先在 issue 里讨论再动手。
        想了解项目当前的路线与欠账，见 [`docs/wiki/设计/05-现状与计划/`](../../docs/wiki/设计/05-现状与计划/)。
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      description: 这个建议针对的痛点 / 场景是什么?
      placeholder: 作为<玩家/作者/开发者>，我希望……因为……
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案
      description: 你设想它怎么工作。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的其它方案
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: 涉及哪一层
      options:
        - 前端 frontend
        - 后端 backend
        - core（引擎/store/resolve/build/eval 等）
        - GM 行为 / 教条
        - 团本构建
        - 文档 / wiki
        - 其它 / 不确定
    validations:
      required: false
