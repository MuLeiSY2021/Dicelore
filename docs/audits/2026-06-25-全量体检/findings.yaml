- finding_id: CROSS-END
  role: 合并
  title: 终局判据缺失——场景 A 的"完整一局"无收局口径，eval harness 跑出的数据无法回答"做成了"
  kind: 推导断节
  layer: 跨层
  severity: P0
  evidence: >
    wiki 成功标准定总判据为"F1/F2/F3 被治住"但未定"一局何时算终局"；
    backlog-core E1/E2 标注：gm-core 教"别朝结局叙事"却没教"何时收局正当" → 真 GM 可能永不收局或只死亡收；
    ADR-0009 定了唯二终局出口（game_end / you_death）但"何时敲、由谁敲"未定；
    packages/core/src/mcp/handlers/io.ts L74-82 gameEndHandler 只落 note event + metaSet(db,"ended")——无任何触发条件校验（不查 sheet 钟/HP/回合数），GM 调即终局；
    apps/orchestrator/src/api/dice.ts L142-146 GET /sessions/:id 返回 ended: false 硬编码不读 session_meta.ended，与 WS game_end 消息矛盾。
  description: >
    业务侧验收口径"该让玩家失败时它真的让失败发生"隐含"一局有终局"，但设计侧未定义终局判据、实现侧 game_end 工具触发条件空白且 REST/WS 信号矛盾。
    后果：eval harness 跑多少轮都"没做错"但"也没做成"——一局可能永不收局，验收口径无法闭合。
    违"AI 有讨好本能、不可信"立项前提——GM 若被讨好本能驱使永不调 game_end 则永不终局。
  impact: >
    F2 harness 多轮跑测的数据无法回答"做成了"——GM 不收局 = 验收口径无法判定通过；
    玩家体验上"一局永不结束"是可玩性崩坏；
    GET /sessions/:id 仍报 ended:false，前端状态机无法正确切换终局画面（即便 WS game_end 消息触发了 setGameEnd，下次刷新又拉回 false）。
  suggested_fix: >
    ① 架构层推 E2 ADR：定终局触发条件（PO 候选 N 回合 / 主线 Front 钟满 / 玩家死亡三选一）+ "由谁敲"（建议框架据 sheet 钟/watcher 自动敲防讨好 vs GM 自调）；
    ② GET /sessions/:id 读 metaGet(db,"ended") 填 ended 字段修 REST/WS 矛盾（独立 bug，不依赖 ADR）；
    ③ 定与可逆状态的交互：终局后回滚=未终局（快照 restore 含 session_meta.ended 复位）、复活=特殊 game_end 特例；
    ④ 与终局后玩家流程合并设计：game_end 后"回滚 / 重开 / 主页"三选。
  confidence: 高
  hit_by: [产品, 架构, 后端]

