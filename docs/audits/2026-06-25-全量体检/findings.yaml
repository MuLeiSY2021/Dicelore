- finding_id: FE-001
  role: 前端
  title: WS 重连竞态——sessionId 变更时旧 refetch Promise 返回后 setSnapshot 覆盖新会话快照，narration/pendingRoll 状态残留
  kind: 领域漏洞
  layer: 前端
  severity: P2
  evidence: >
    apps/web/src/live/useSession.ts L62-79 connect()：ws.onclose = () => { ...; timer = setTimeout(() => { refetch(); connect(); }, delay); }；
    refetch() 在 onclose 调度的 setTimeout 回调内；若重连期间 refetch 返回慢（网络差），切会话后旧 refetch 的 .then(setSnapshot) 仍会跑——setSnapshot 是闭包绑死旧 sessionId 的，但 setSnapshot 会更新 state（React 不区分是哪个 sessionId 的 snapshot），导致新会话闪一下旧会话的呈现快照；
    同时 narration/pendingRoll/reveals 等数组状态在切会话时不重置——useSession 的 useState 初始化只在首次 mount 跑，sessionId 变更时 effect 重跑但 state 不清零。
  description: >
    useSession 的 WS 重连逻辑在"重连 in-flight 期间切会话"时存在状态污染：旧 sessionId 的 refetch Promise 返回后 setSnapshot 会覆盖新 sessionId 的快照，因为 setSnapshot 不绑 sessionId。
    同时 narration/pendingRoll 等数组状态在切会话时不重置——旧会话的 narration 段落会残留到新会话视图。
  impact: >
    玩家在会话栏切换会话时：① 新会话短暂闪现旧会话的呈现快照（refetch 竞态）；② 旧会话的 narration 段落残留——玩家看到上一局的叙事文本混进本局；③ 旧会话的 pendingRoll 残留——新会话显示掷骰按钮但本局无待掷，点击 409。
  suggested_fix: >
    ① useSession 在 sessionId 变更时重置所有 state（narration=[]、pendingRoll=null、reveals=[]、gameEnd=null、error=null、generating=false）；
    ② refetch 的 .then 里加 sessionId 守卫：if (currentSidRef.current === sessionId) setSnapshot(s)；
    ③ 或将 useSession 拆成 key=sessionId 的子组件（React 自动 remount 清 state），最干净。
  confidence: 高
  hit_by: [前端]

