- finding_id: CROSS-ENRICH
  role: 合并
  title: enrich 补全逻辑在 DiceSession 而非 core——缝 A 出参贫信息，换 host 需重写，mapCanonWrite 非纯映射器
  kind: 领域漏洞
  layer: 跨层
  severity: P2
  evidence: >
    apps/orchestrator/src/dice/DiceSession.ts L75-86 enrich(evt)：narrate 的 content 从 log 行按 evt.seq 取（SELECT content FROM log WHERE seq=?）、game_end 的 reason+outcome 从 session_meta.ended 取，注入 output 供 mapCanonWrite 消费；
    apps/orchestrator/src/dice/notify.ts L17-76 mapCanonWrite 是纯映射器但依赖 enrich 先补全——narrate 分支 L33 evt.output.content、game_end 分支 L21 evt.output.reason/outcome 都是 enrich 注入的；
    core 工具出参（CanonWriteEvent.output）不含展示所需内容：narrate 出参 {event_id}（io.ts L71）、game_end 出参 {ended:true, event_id}（io.ts L81）——均无 content/reason/outcome。
  description: >
    架构层（ADR-0020 + 接口页 §5.1）定缝 A 是"core 写规范态后回调 onCanonWrite、后端映射成 WS 消息"——契约清晰。
    但 enrich 补全点的设计有轻微架构债：core 工具出参（CanonWriteEvent.output）本应自包含展示信息，但 narrate 出参不含 content（content 在 log 行）、game_end 出参不含 reason/outcome（在 session_meta）——须由 DiceSession 从 store 反查注入。
    这使 mapCanonWrite 不是纯映射器（依赖 enrich 先补全），且 enrich 逻辑是会话层职责、非 core 职责——若换 host（如未来 Tauri 壳或自研 agent），enrich 逻辑要重写。
  impact: >
    当前不影响正确性（enrich 补全后 mapCanonWrite 正确映射），但：① 缝 A 出参契约不自包含——core 工具出参贫信息，消费方须反查 store；② enrich 散落 DiceSession，换 host 要重写；③ 与 ARCH-004 port 契约叠加——若抽 AgentAdapter port，enrich 逻辑须明确归属。
  suggested_fix: >
    ① 优先方案：core 工具出参自包含展示信息（narrate 出参带 content、game_end 出参带 reason+outcome），免 enrich；
    ② 或 enrich 逻辑收进 core createMcpServer（onCanonWrite 回调前补全），mapCanonWrite 保持纯映射、DiceSession 不再 enrich；
    ③ 或显式标注"enrich 是 adapter 层职责"，在 ARCH-004 port 契约里明确 enrich 归属。
    非阻塞，发版闸前 port 契约定型时一并收口。
  confidence: 高
  hit_by: [架构, 后端]

