- finding_id: CROSS-AUTH
  role: 合并
  title: 零鉴权越权——缝 B 三层全断（架构定/后端零中间件/前端零配合），任意客户端可读/改/删任意 sessionId 含 DELETE 不可逆破坏 + lore Catalog 污染
  kind: 领域漏洞
  layer: 跨层
  severity: P0
  evidence: >
    架构层（接口页 §0 两条缝表 + ADR-0018 ③）定缝 B「web 可远程、未来多租户、需要解耦——会话路由/鉴权/多实例分片都在这条」「Web ＝ REST/WS 带会话 token」「服务器集中持密钥」；
    但实现 apps/orchestrator/src/server.ts L50 `const app = new Hono()` 后直接 app.route 拼子应用、全程无 app.use(...) 鉴权中间件；
    api/dice.ts L148 POST /sessions/:id/messages 直接 getOrCreateHost(id)——id 从 URL 取、无 token 校验、无 session 归属；L85 DELETE /sessions/:id 零鉴权可 rmSync 整个 session 文件夹（.db + GM raw 日志）；
    api/lore.ts L34 POST /catalog/commit、L54 POST /catalog/:tuanbenId/tag、L61 POST /lore-sessions/:id/messages 同样零鉴权——团本包库可被任意客户端污染；
    api/ws.ts L36 WS 升级 handleUpgrade 同样无 token 校验；
    前端 apps/web/src/api/client.ts 全部 fetch 调用均无 Authorization 头、无 token；useSession.ts L65 WS 升级无 token；sessionId 前端自造（HomePage L50 s-${commitId.slice(0,8)} / CatalogPage L44 ${slug}-${random}）后端无条件接受。
  description: >
    架构层已正确识别缝 B 需要"会话路由 + 鉴权 + 多实例分片"，但下游实现完全没承接：Hono app 零中间件、sessionId 即权限、lore 路径连团本包库都能被任意客户端提交/打 tag。
    这不是"架构没定"，是"架构定了、实现零承接"——缝 B 的鉴权契约停留在文档、无一行代码落地。
    sessionId 虽含随机但非密钥——可枚举/可从日志泄露/可猜测，且 ADR-0018 明示 Web 壳「服务器集中持密钥」与当前「sessionId 即权限」直接矛盾。
    DELETE 端点破坏性远高于读写——rmSync recursive force 删整个文件夹不可逆，包括 session.db + _session.jsonl（含可能的 API key 泄露痕迹）。
  impact: >
    远程部署场景（AGPL 网络服务条款暗示、ADR-0018 Web 壳明示）：任意客户端可读/改/删任意 sessionId 的存档、可向任意团本注入恶意 commit/tag、可借 /diagnostics/model-test 让后端代发请求到任意目标（SSRF 叠加）；
    本机单玩场景风险降级（无跨用户），但架构债仍在：sessionId 无主、lore 路径团本包库可被污染、缝 B 多租户拓扑预留但无边界。
    违发版闸「多租户隔离」、违 ADR-0018 ③ Web 壳裁定——发版闸前必须正面解，否则不可上市。
  suggested_fix: >
    ① 缝 B 加会话级 token（开局 POST /sessions 返回 sessionId+token，后续 REST 动作 + WS 升级带 token 校验）；DELETE /sessions/:id 必须校验归属，非 owner 返回 403；
    ② sessionId 改后端生成（不由前端自造），前端 client.ts 所有 fetch 加 Authorization: Bearer ${token} 头、useSession WS 升级用 ?token=${token} query param 或 subprotocol 传 token；
    ③ lore 路径 /catalog/commit·/catalog/:tuanbenId/tag·/lore-sessions/:id/messages 加鉴权（与 dice 同套 token/登录态）+ Catalog 加 owner_id 列 + commit/tag 校验归属；
    ④ 远程部署默认拒绝跨 Origin（CORS 收紧）+ 反向代理加 auth；
    ⑤ 过渡期（鉴权未接线前）server bind 127.0.0.1。
  confidence: 高
  hit_by: [用户, 架构, 前端, 后端]

- finding_id: QA-002
  role: 测试
  title: F1"掷骰绕过率"无机械检测——assertions 只统计 verdict 工具调用次数，GM 完全不骰纯 narrate 编结果不会被标记违规
  kind: 领域漏洞
  layer: 流程
  severity: P0
  evidence: >
    packages/core/src/eval/assertions.ts L57-75 toolStats：只按 event.kind 计数（verdictGated/verdictAuto），无"该骰却没骰"的检测；
    grade.ts L60-62 注释"F1 时序（机械）：每条 verdict 的 seq 应早于其后描述它的 narrate"——但代码只取了 verdictSeqs/narrateSeqs，没实现时序校验逻辑（注释是 TODO、非实现）；
    GM 遇对抗局面不调 resolve_* 工具、纯用 narrate 编"你砍中了巨龙"时 verdictCount=0，但 assertions 不会标记为 F1 违规（0 只是个数字、非 fail 信号）。
  description: >
    成功标准 §1 F1 定义"每个'结果不确定'的判定都实际走了掷骰工具"——但"结果不确定"是语义判断，assertions 无法机械判定哪些局面该骰。
    GM 投机取巧路径：遇到该骰的局面直接 narrate 编结果（不调 resolve_*），assertions 的 verdictCount=0 不会被标记 fail，grader 若也宽容（LLM 讨好本能）则 F1 被误判 pass。
    这是 eval 可被欺骗的核心面：机械地板漏掉"不骰"违规，语义判断又靠有讨好本能的 LLM。
    成功标准 §3 已显式防"裁判 agent 自校准风险"（对抗性 rubric + 人评一致性抽查），但 eval harness 无此实现。
  impact: >
    GM 可经"不调掷骰工具、纯 narrate 编结果"绕过 F1 检测——eval 报告 F1 pass 但实际未治住；
    若 eval 报告作为发版依据，"with 应趋近 0"的 F1 绕过率可能假性达标（verdictCount 低≠F1 治住，可能是 GM 根本没骰）。
  suggested_fix: >
    ① assertions 加 F1 时序校验实现（grade.ts L60 注释的 TODO）：verdict.seq 应早于描述它的 narrate.seq，narrate 在所有 verdict 之前＝可疑绕过；
    ② 加"对抗局面无 verdict"检测：playerTurns 里标"此回合应触发对抗"的预期（scenario.json 加 expects 字段），assertions 比对预期 vs 实际 verdict 数；
    ③ grader.md 的"对抗性 rubric"具体化：写死 grader prompt 默认怀疑"这是不是没骰就编结果"；
    ④ 人评一致性抽查流程落地：定期抽 N 个 eval 样本人评校准 grader 松紧。
  confidence: 高
  hit_by: [测试]

- finding_id: QA-003
  role: 测试
  title: F2 软着陆率无机械地板——完全靠 grader（LLM 判），且 baseline 对照报告缺失（reports/ 仅一份 doctrine 报告，无 with/without 对照）
  kind: 领域漏洞
  layer: 流程
  severity: P0
  evidence: >
    packages/core/src/eval/assertions.ts 只有 narrateLeak/missingNarrate/toolStats 三个机械断言——无 F2 软着陆的机械检测；
    grader.md L21 "坏结果照后果走、没软着陆吗？（F2）"完全靠 grader（LLM 判）；
    reports/ 目录只有 2026-06-24-orc-hunt-doctrine.md 一份报告，无 baseline 对照报告——验收口径要求 with/without baseline 范式，但 reports/ 无 baseline 数据；
    doctrine 报告自陈"多轮 playerTurns + baseline 对照 + 真人语料对标后续"——即 baseline 对照是 TODO、未跑。
  description: >
    验收口径的核心是"相对判据"——with 应显著低于 baseline 的软着陆率。但：
    ① F2 无机械地板（assertions 不检测软着陆），全靠 grader LLM 判；
    ② baseline 对照报告缺失——reports/ 只有 doctrine 档，无 baseline 档，"with 比 baseline 好"无数据支撑；
    ③ grader 自校准风险在 eval harness 无实现（无对抗性 rubric prompt、无人评抽查流程）。
    三者叠加：F2 的"做成了"判定目前完全不可信。
  impact: >
    "F2 软着陆率 with 应显著低于 baseline"——无 baseline 数据则该判据无法判定通过；
    若仅凭 doctrine 档 grader 判 F2 pass，可能假性达标（grader 讨好本能 + 无对照）；
    发版闸前若不补 baseline 对照 + grader 校准，F2 验收口径不可信。
  suggested_fix: >
    ① 补 baseline 对照跑测：每个场景跑 doctrine + baseline 各 N 局，reports/ 落对照报告；
    ② F2 加弱机械地板：检测"verdict 后 narrate 的语气是否突变积极"（如坏结果后 narrate 出现"幸好/不过/但是/突然"等转折词＝可疑软着陆），作 grader 参考非硬判；
    ③ grader 对抗性 rubric 具体化 + 人评抽查流程落地；
    ④ F1 的"存疑"也需多轮跑测才能定——doctrine 报告开局轮 F1 存疑，需补 playerTurns 推进到对抗回合再判。
  confidence: 高
  hit_by: [测试]

- finding_id: CROSS-GATE-RELEASE
  role: 合并
  title: 发版闸（路线图第五批）无自动化 gate——四项发版闸全未实现且无 CI 检查/阻断脚本真拦住
  kind: 推导断节
  layer: 流程
  severity: P0
  evidence: >
    路线图第五批发版闸列四项：承重绑定 ADR + port 契约、prompt injection 威胁建模、模型 key 托管+限流、多租户隔离——
    全部是文档性陈述（"里程碑三前必做"），无任何自动化 gate：
    ① grep gate|闸|enforce|block.*release across CI/config 无命中（无发版前 checklist 脚本、无 CI job 验发版闸条目）；
    ② 四项发版闸条目当前实现状态全 ✗（承重 port 契约 ✗ ARCH-004、prompt injection 威胁建模 ✗ ARCH-009、模型 key 托管 ✗ USER-007 key 明文存 localStorage、多租户隔离 ✗ ARCH-001 零鉴权）；
    ③ 路线图第三/四批 feat 项是否真"不破坏冻结令"靠路线图自述、无 backlog 侧交叉验证——backlog 三池相关条目（O1/CO-后端-采集/B7/C1/E1 等）本身没标"冻结中/不冻结"状态。
  description: >
    发版闸是 PO 对"不可上市"边界的安全承诺，但路线图只写了"必做"清单，无执行机制——
    "发版闸"若只是文档里一句"里程碑三前必做"，无 CI 检查、无发版前 checklist、无阻断脚本，则它不拦任何东西：人忘了一次、或赶进度跳过一次，发版闸就形同虚设。
    "发版闸"名不副实——是"发版前提醒单"而非"发版闸"。
  impact: >
    发版闸四项全未实现，若无 gate，可能在未实现时仓促发版——远程部署下零鉴权越权 + key 泄露 + 注入面全开，直接致命。
  suggested_fix: >
    ① 加发版前 checklist 脚本（如 scripts/release-gate-check.ts）：扫鉴权中间件是否存在、SSRF 白名单是否配、key 是否走后端托管、port 契约 ADR 是否落地，任一缺失 exit 1；
    ② CI 加发版闸标签门：release PR 必须带 release-gate-passed 标签（由 checklist 脚本生成），否则 block merge；
    ③ 四项发版闸条目在 backlog 加"状态：未实现"标记 + 路线图加"gate 机制：checklist 脚本"反指；
    ④ backlog 三池相关条目加"冻结中/不破坏冻结令"标记与路线图双向对齐。
  confidence: 高
  hit_by: [产品, 测试]

- finding_id: USER-001
  role: 用户
  title: README 承诺"CLI 一键脚手架即开玩"，但 CLI 实际只有 new/list/inspect/init 四命令——无 play/roll/choice，真玩必须起 web app + orchestrator 后端
  kind: 推导断节
  layer: 文档
