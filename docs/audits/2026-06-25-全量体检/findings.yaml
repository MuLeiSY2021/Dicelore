  kind: 领域漏洞
  layer: 文档
  severity: P3
  evidence: >
    backlog-后端 CO-后端-采集 标"orchestrator 调 Agent SDK 处不采集 input/output/cache token usage、不按 turn/session/agent 归因落库"；
    但 grep apps/orchestrator/src/dice/DiceGm.ts L61/87：消息体已读 usage 字段并 sessionLogger.info({ ..., usage: m.usage, ...}) 落到 raw session log；
    L87 sessionLogger.info({ idx, subtype, duration_ms, usage: m.usage, result: m.result }, "result")——usage 落 result info 级；
    session 目录结构（L36）：<sessionsDir>/dice/sessions/<sessionId>/{session.db, <sessionId>_session.jsonl, *.log}——自包含文件夹。
  description: >
    backlog 描述"零采集"过强——实际是"raw log 记了 usage、但未结构化采集落库"。
    DiceGm 的 raw 日志可观测性是项目最扎实的部分：① _session.jsonl 全量落原始结构（可回放/迁移）；② *.log 可读摘要（turn start/end/opts/异常）；③ usage 落 result info（token 用量可查）；④ session 自包含文件夹（排障时整个文件夹拷走即可）。
    缺的是：① 结构化采集落库（per-turn/session/agent 归因）；② 查询接口（跨 session 聚合 token 用量）；③ eval 报告与 raw 日志的关联。
  impact: >
    状态描述不精确会让下游低估已有基建、重复造轮子；CO-后端-采集 落地时若不知 raw log 已有 usage，可能重复采。
  suggested_fix: >
    backlog-后端 CO-后端-采集 描述改为"raw session log 已记 usage（DiceGm.ts:87）、但未结构化采集落库、无归因、无查询接口"；
    下一步明确：从 raw log 抽 usage → 结构化 schema → 归因落库 → 查询接口；
    eval 报告里加 raw 日志路径指回（reports/ 报告模板加 raw_log: <session_dir> 字段），方便评估者回溯。
  confidence: 高
  hit_by: [产品, 测试]

