- finding_id: CROSS-GATE
  role: 合并
  title: rollGate 内存态与宕机恢复架构层有缝——后端重启 waiters 全丢，recovery 重弹 roll_staged 但 resolveRoll 找新空 Map 返回 409 死锁
  kind: 领域漏洞
  layer: 后端
  severity: P2
  evidence: >
    apps/orchestrator/src/dice/rollGate.ts L37 private waiters = new Map<number, () => void>()——内存态，后端进程重启 waiters 全丢；
    recovery.ts L17 restagePendingRolls 会重弹 roll_staged（DB 里有 pending_roll row status=awaiting）——重弹后玩家再点掷骰 POST /roll，但 resolveRoll (rollGate.ts L50) 找的是新 waiters Map（重启后空），if (!w) return false → POST /roll 返回 409 no_pending_roll（dice.ts L172）——玩家看到"无待掷"但 UI 上明明显示掷骰按钮；
    dice.ts L168-173 handleRoll 调 host.handleRoll(eventId) → gate?.resolveRoll → waiters 空 → false → 409，fallback 路径未实现"waiters 空时重新驱动 GM"；
    useSession.ts L69-74 WS 断线指数退避重连，重连后 refetch 全量对账——但 refetch 拿到的 presentation 若仍有 pendingRoll，会重新 setPendingRoll，玩家点掷骰又走 POST /roll → 仍 409（waiters 空）。
  description: >
    架构层（ADR-0019 明骰阻塞式 resolver + 接口页 §9.2 单人 gate）定 PlayerRollGate 是"core handler await gate(eventId) 时弹 roll_staged + 挂起；POST /roll → resolveRoll 解开"。
    但 gate 的 waiters 是内存态、不持久化——后端重启后 DB 里 pending_roll 还在（recovery 重弹 roll_staged），但 waiters 空（await 的 Promise 没了）。
    结果：玩家看到掷骰按钮（recovery 重弹成功）→ 点击 → 409（waiters 空）→ 玩家无解。
    recovery.ts 注释"重驱 GM 的非阻塞喂回属 DiceSession.handleRoll fallback"——但这个 fallback 没实现。
    单人本机场景后端重启概率低，但 eval/联调高频重启——commit 30fdfb0 加超时兜底的直接动因就是 eval 卡死，本条是同源问题的另一面。
  impact: >
    后端重启后卡在掷骰等待的会话死锁——玩家点掷骰无效、无提示如何恢复（409 error 通道会显示，但与 CROSS-ERR 错误吞没叠加，roll 的 .catch(()=>{}) 吞掉 409，玩家完全静默失败）。
  suggested_fix: >
    ① handleRoll 在 waiters 空时，不返回 false，而是重新驱动 GM 走 outcomeOpenHandler 的"无 gate 立即掷"分支（debug 模式逻辑复用到生产重连路径）；
    ② 或 restagePendingRolls 时重建 waiters（让 gate 重新 await）；
    ③ roll 的 409 错误必须显示给玩家（修 CROSS-ERR 的 catch 吞没），并给"重试/跳过"选项。
  confidence: 高
  hit_by: [用户, 架构]

