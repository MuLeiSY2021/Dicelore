- finding_id: FE-011
  role: 前端
  title: PlayPage 拖拽重排 localStorage 存储键含 sessionId——切会话时 hidden/mini 状态不重置且无上限
  kind: 领域漏洞
  layer: 前端
  severity: P3
  evidence: >
    apps/web/src/pages/PlayPage.tsx L84 const orderKey = dicelore.stage.order.${sid}；
    L86-88 try { const raw = localStorage.getItem(orderKey); setOrder(raw ? JSON.parse(raw) : []); } catch { setOrder([]); }；
    L90-92 persistOrder = (next) => { setOrder(next); try { localStorage.setItem(orderKey, JSON.stringify(next)); } catch { /* 隐私模式忽略 */ } }；
    设计是每会话独立布局（合理），但：① hidden/mini 状态是内存态、切会话不重置——与 FE-001 竞态同源；② localStorage 无清理——玩家删会话后该 sid 的 order 残留；③ order 数组无 schema 校验。
  description: >
    PlayPage 的面板布局（order/hidden/mini）持久化设计基本合理（try-catch 兜底隐私模式、每会话独立 key），但：
    ① hidden/mini 在切会话时不重置——玩家在新会话看到面板莫名隐藏/最小化（与 FE-001 竞态叠加放大）；
    ② localStorage 残留——长用后几十个旧 sid 的 order 堆积（小内存泄漏，单机场景可忽略）。
  impact: >
    切会话时 hidden/mini 残留——玩家在新会话看到面板莫名隐藏/最小化；
    localStorage 残留——长用后几十个旧 sid 的 order 堆积（小，单机可忽略）。
    非阻塞，体验债。
  suggested_fix: >
    ① hidden/mini 在 sessionId 变更时重置（与 FE-001 修复合并）；
    ② removeSession 时清该 sid 的 localStorage order key；
    ③ order 数组加 schema 校验（Array.isArray + 元素是 string）——非必须，try-catch 已兜底。
  confidence: 高
  hit_by: [前端]
