- finding_id: CROSS-INJECT
  role: 合并
  title: prompt injection 威胁建模缺失——玩家自由文本/团本内容直接进 GM 上下文无防线，validatePack 只验结构不验内容安全
  kind: 领域漏洞
  layer: 跨层
  severity: P1
  evidence: >
    apps/orchestrator/src/dice/DiceGm.ts L141 for await (const msg of query({ prompt: input.text, options }))——玩家自由文本（input.text）直接作 prompt 喂 GM；
